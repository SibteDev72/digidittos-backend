services:
  # MongoDB (local dev instance)
  mongo:
    image: mongo:7
    container_name: digidittos-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - digidittos-dev-network

  # Backend (development with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: digidittos-backend-dev
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/digidittos
      JWT_SECRET: dev-secret-key-do-not-use-in-production
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./src:/app/src
      - backend_uploads_dev:/app/uploads
    networks:
      - digidittos-dev-network

volumes:
  mongo_data_dev:
  backend_uploads_dev:

networks:
  digidittos-dev-network:
    driver: bridge
