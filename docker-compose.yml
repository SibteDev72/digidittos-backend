services:
  # Backend API (production — connects to MongoDB Atlas)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digidittos-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads

volumes:
  backend_uploads:
